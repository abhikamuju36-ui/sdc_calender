<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDC Centralized Calendar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" href="icons/sdc-calendar-icon-C.ico" type="image/x-icon" />
  <link rel="stylesheet" href="styles.css?v=13" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="pre-loader" style="position:fixed;inset:0;background:#0A1628;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999">
    <img src="assets/sdc-logo.png" style="height:60px;opacity:0.8" alt="SDC"/>
    <div style="width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:40%;background:#0066CC;border-radius:2px;animation:slide 1.2s ease-in-out infinite" id="pre-bar"></div>
    </div>
    <div style="color:rgba(255,255,255,0.4);font-family:Inter,sans-serif;font-size:13px">Loading calendar…</div>
    <style>#pre-bar{animation:slide 1.2s ease-in-out infinite}@keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(550%)}}</style>
  </div>
  <div id="root"></div>


  <script src="data.js?v=13"></script>
  <script type="text/babel" data-presets="react" src="app.jsx?v=13"></script>
</body>
</html>
